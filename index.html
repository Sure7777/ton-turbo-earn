<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Turbo Earn</title>
    <style>
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            color: white;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .balance-card {
            background: rgba(0, 255, 200, 0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 255, 200, 0.3);
        }
        .balance {
            font-size: 42px;
            font-weight: bold;
            color: #00ffc8;
        }
        .points {
            font-size: 18px;
            color: #aaa;
        }
        .ad-btn {
            background: linear-gradient(135deg, #0088cc, #006699);
            border: none;
            color: white;
            padding: 16px 32px;
            border-radius: 48px;
            font-size: 18px;
            font-weight: bold;
            margin: 12px 0;
            cursor: pointer;
            width: 100%;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        .task-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 16px;
            color: white;
            cursor: pointer;
        }
        .footer {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 12px;
            margin-top: 24px;
        }
        .footer span {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="balance-card">
            <div class="balance" id="balance">0</div>
            <div class="points">≈ <span id="tonBalance">0</span> TON</div>
        </div>

        <button class="ad-btn" onclick="earnPoints()">🎬 شاهد إعلان +1,000</button>

        <div class="grid">
            <div class="task-btn" onclick="completeTask(1)">📢 مهمة 1<br><span>+500</span></div>
            <div class="task-btn" onclick="completeTask(2)">🤖 مهمة 2<br><span>+500</span></div>
            <div class="task-btn" onclick="completeTask(3)">💬 مهمة 3<br><span>+500</span></div>
            <div class="task-btn" onclick="completeTask(4)">⭐ مهمة 4<br><span>+500</span></div>
        </div>

        <div class="footer">
            <span>🏠 الرئيسية</span>
            <span>💰 الربح</span>
            <span>👥 الإحالات</span>
            <span>💳 المحفظة</span>
        </div>
    </div>

    <script>
        let points = 0;
        
        function updateUI() {
            document.getElementById('balance').innerText = points.toLocaleString();
            let ton = (points / 10000000).toFixed(4);
            document.getElementById('tonBalance').innerText = ton;
        }
        
        function earnPoints() {
            points += 1000;
            updateUI();
            alert("🎉 تم إضافة 1000 نقطة! رصيدك: " + points + " نقطة");
        }
        
        function completeTask(taskId) {
            points += 500;
            updateUI();
            alert("✅ تم إكمال المهمة " + taskId + "! +500 نقطة");
        }
        
        updateUI();
    </script>
</body>
</html>
