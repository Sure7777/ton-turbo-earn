
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Turbo - لوحة التحكم</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            font-family: system-ui, sans-serif;
            color: white;
            padding: 20px;
        }
        .admin-badge {
            background: #00ffc8;
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00ffc8; margin-bottom: 30px; font-size: 28px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0,255,200,0.3);
        }
        .stat-value { font-size: 32px; font-weight: bold; color: #00ffc8; }
        .stat-label { font-size: 14px; color: #aaa; margin-top: 8px; }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .section h2 { color: #00ffc8; margin-bottom: 20px; font-size: 22px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #00ffc8; }
        input, select, button {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
        }
        input, select { background: rgba(255,255,255,0.1); color: white; margin-right: 10px; }
        button {
            background: linear-gradient(135deg, #0088cc, #006699);
            color: white;
            cursor: pointer;
        }
        .danger-btn { background: linear-gradient(135deg, #cc4444, #992222); }
        .success-btn { background: linear-gradient(135deg, #00cc88, #009966); }
        .card { margin-bottom: 20px; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .hidden { display: none; }
        .access-denied {
            text-align: center;
            padding: 50px;
            background: rgba(255,0,0,0.2);
            border-radius: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<script>
    // بيانات المشروع والمالك
    const ADMIN_ID = 6960850082;
    const BOT_TOKEN = "8583588150:AAEGJ_E0svH81zp55jm0y0kLd1Y7qHneIuk";
    
    let currentUserId = null;
    let isAdmin = false;
    
    // محاولة الحصول على بيانات المستخدم من Telegram WebApp
    if (window.Telegram && Telegram.WebApp) {
        currentUserId = Telegram.WebApp.initDataUnsafe?.user?.id;
        if (currentUserId === ADMIN_ID) {
            isAdmin = true;
            document.body.style.borderTop = "4px solid #00ffc8";
        }
    }
    
    // إذا لم يتم التعرف على المستخدم (فتح من متصفح عادي)
    if (!currentUserId) {
        // نسأل المستخدم إذا كان هو المالك
        const userInput = prompt("فتح لوحة التحكم من متصفح خارج تليجرام. إذا كنت المالك، أدخل رمز الدخول: 1234");
        if (userInput === "1234") {
            isAdmin = true;
        }
    }
    
    if (!isAdmin) {
        document.write('<div class="access-denied"><h2>⛔ وصول ممنوع</h2><p>هذه الصفحة مخصصة للمالك فقط.</p><button onclick="window.location.href=\'https://sure7777.github.io/ton-turbo-earn/\'">العودة إلى التطبيق</button></div>');
        throw new Error("غير مصرح بالدخول");
    }
    
    // إذا كان مديراً، نعرض لوحة التحكم
    document.write(`
    <div class="container">
        <div class="admin-badge">👑 أنت المالك | ID: ${currentUserId || 'مدير'}</div>
        <h1>🚀 TON Turbo Earn - لوحة التحكم</h1>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalUsers">0</div><div class="stat-label">إجمالي المستخدمين</div></div>
            <div class="stat-card"><div class="stat-value" id="totalPoints">0</div><div class="stat-label">إجمالي النقاط الموزعة</div></div>
            <div class="stat-card"><div class="stat-value" id="totalWithdrawn">0</div><div class="stat-label">TON المسحوبة</div></div>
            <div class="stat-card"><div class="stat-value" id="platformProfit">0</div><div class="stat-label">صافي ربح المنصة</div></div>
        </div>

        <div class="section">
            <h2>💰 طلبات السحب المعلقة</h2>
            <table id="withdrawalsTable">
                <thead><tr><th>المستخدم</th><th>المبلغ (TON)</th><th>المحفظة</th><th>الحالة</th><th>إجراء</th></tr></thead>
                <tbody><tr><td colspan="5">لا توجد طلبات حالياً</td></tr></tbody>
            </table>
        </div>

        <div class="section">
            <h2>⚙️ إعدادات الاقتصاد</h2>
            <div class="card">
                <div class="flex">
                    <input type="number" id="dailyReward" placeholder="المكافأة اليومية" value="100000">
                    <input type="number" id="minWithdraw" placeholder="حد السحب الأدنى" value="1000000">
                    <input type="number" id="withdrawFee" placeholder="رسوم السحب (TON)" value="0.03" step="0.01">
                    <button onclick="saveEconomySettings()" class="success-btn">💾 حفظ الإعدادات</button>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>📢 إعدادات الإعلانات (AdsGram)</h2>
            <div class="flex">
                <input type="text" id="adsgramBlockId" placeholder="معرف الإعلان (Block ID)">
                <button onclick="saveAdSettings()" class="success-btn">💾 حفظ إعدادات الإعلانات</button>
            </div>
            <p style="margin-top: 15px; font-size: 12px; color: #aaa;">💡 احصل على Block ID من موقع AdsGram بعد تسجيل الدخول → My Apps → إنشاء تطبيق جديد → نسخ Block ID</p>
        </div>

        <div class="section">
            <h2>👥 نسب الإحالة</h2>
            <div class="flex">
                <input type="number" id="level1" placeholder="المستوى 1 (%)" value="7" style="width: 100px;">
                <input type="number" id="level2" placeholder="المستوى 2 (%)" value="3" style="width: 100px;">
                <input type="number" id="level3" placeholder="المستوى 3 (%)" value="1" style="width: 100px;">
                <input type="number" id="ownerShare" placeholder="نسبة المالك (%)" value="2" style="width: 100px;">
                <button onclick="saveReferralSettings()" class="success-btn">💾 حفظ</button>
            </div>
        </div>

        <div class="section">
            <h2>🛡️ حماية الطوارئ</h2>
            <button onclick="emergencyPause()" class="danger-btn">⛔ إيقاف كل السحوبات مؤقتاً</button>
            <button onclick="resetDailyLimits()" class="danger-btn">🔄 إعادة تعيين الحدود اليومية</button>
        </div>
    </div>
    `);
    
    // الدوال
    function saveEconomySettings() {
        const daily = document.getElementById('dailyReward').value;
        const min = document.getElementById('minWithdraw').value;
        const fee = document.getElementById('withdrawFee').value;
        localStorage.setItem('economy', JSON.stringify({ dailyReward: daily, minWithdraw: min, withdrawFee: fee }));
        alert('تم حفظ إعدادات الاقتصاد!');
    }
    
    function saveAdSettings() {
        const blockId = document.getElementById('adsgramBlockId').value;
        localStorage.setItem('adsgram', blockId);
        alert('تم حفظ إعدادات الإعلانات! سيتم تفعيلها عند ربط AdsGram SDK.');
    }
    
    function saveReferralSettings() {
        const l1 = document.getElementById('level1').value;
        const l2 = document.getElementById('level2').value;
        const l3 = document.getElementById('level3').value;
        const owner = document.getElementById('ownerShare').value;
        localStorage.setItem('referrals', JSON.stringify({ level1: l1, level2: l2, level3: l3, ownerShare: owner }));
        alert('تم حفظ نسب الإحالة!');
    }
    
    function emergencyPause() {
        localStorage.setItem('pauseWithdrawals', 'true');
        alert('⚠️ تم إيقاف جميع السحوبات مؤقتاً!');
    }
    
    function resetDailyLimits() {
        localStorage.setItem('dailyWithdrawn', '0');
        alert('تم إعادة تعيين الحدود اليومية.');
    }
    
    function loadSettings() {
        const economy = JSON.parse(localStorage.getItem('economy'));
        if (economy) {
            if(document.getElementById('dailyReward')) document.getElementById('dailyReward').value = economy.dailyReward || 100000;
            if(document.getElementById('minWithdraw')) document.getElementById('minWithdraw').value = economy.minWithdraw || 1000000;
            if(document.getElementById('withdrawFee')) document.getElementById('withdrawFee').value = economy.withdrawFee || 0.03;
        }
        const adsgram = localStorage.getItem('adsgram');
        if(adsgram && document.getElementById('adsgramBlockId')) document.getElementById('adsgramBlockId').value = adsgram;
        const referrals = JSON.parse(localStorage.getItem('referrals'));
        if(referrals) {
            if(document.getElementById('level1')) document.getElementById('level1').value = referrals.level1 || 7;
            if(document.getElementById('level2')) document.getElementById('level2').value = referrals.level2 || 3;
            if(document.getElementById('level3')) document.getElementById('level3').value = referrals.level3 || 1;
            if(document.getElementById('ownerShare')) document.getElementById('ownerShare').value = referrals.ownerShare || 2;
        }
    }
    setTimeout(loadSettings, 100);
</script>
</body>
</html>
